name: Update GTA Online Weekly Data

on:
  # Run multiple times Thursday to catch sites that publish late
  # GTA resets Thursday ~10:00 UTC — we try at 10:15, 13:00, and 16:00
  schedule:
    - cron: '15 10 * * 4'
    - cron: '0 13 * * 4'
    - cron: '0 16 * * 4'

  # Manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Delete old JSON
        run: rm -f weekly-data.json

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated JSON
        run: |
          git config user.name  "gtao-hq-bot"
          git config user.email "bot@gtao-hq"
          git add weekly-data.json
          git diff --staged --quiet || git commit -m "Weekly update $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
