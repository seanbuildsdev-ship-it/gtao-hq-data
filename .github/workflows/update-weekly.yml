name: Update GTA Online Weekly Data
on:
  schedule:
    - cron: '15 10 * * 4'
    - cron: '0 13 * * 4'
    - cron: '0 16 * * 4'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run scraper
        run: python scraper.py
      - name: Commit updated JSON
        run: |
          git config user.name  "gtao-hq-bot"
          git config user.email "bot@gtao-hq"
          git add weekly-data.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Weekly update $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
